name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ONENATION_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ONENATION_UPLOAD_KEYSTORE_BASE64 }}
      ONENATION_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ONENATION_UPLOAD_KEYSTORE_PASSWORD }}
      ONENATION_UPLOAD_KEY_ALIAS: ${{ secrets.ONENATION_UPLOAD_KEY_ALIAS }}
      ONENATION_UPLOAD_KEY_PASSWORD: ${{ secrets.ONENATION_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Use preinstalled Android SDK
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          test -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          command -v sdkmanager
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --version
          test -d "$ANDROID_SDK_ROOT/platforms/android-34"
          test -d "$ANDROID_SDK_ROOT/build-tools/34.0.0"

      - name: Validate tag matches app version
        run: |
          APP_VERSION="$(sed -n 's/.*versionName "\(.*\)".*/\1/p' app/build.gradle | head -n 1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$APP_VERSION" ]; then
            echo "Unable to read versionName from app/build.gradle"
            exit 1
          fi
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match app version $APP_VERSION"
            exit 1
          fi

      - name: Require release signing
        run: |
          if [ -z "$ONENATION_UPLOAD_KEYSTORE_BASE64" ] || [ -z "$ONENATION_UPLOAD_KEYSTORE_PASSWORD" ] || [ -z "$ONENATION_UPLOAD_KEY_ALIAS" ] || [ -z "$ONENATION_UPLOAD_KEY_PASSWORD" ]; then
            echo "Android signing secrets are missing."
            echo "A release APK for updates must be signed with the same keystore as the installed app."
            exit 1
          fi
          echo "Android signing secrets detected. Building an update-compatible signed release APK."

      - name: Decode release keystore
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          echo "$ONENATION_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ONENATION_UPLOAD_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ONENATION_UPLOAD_KEYSTORE_PASSWORD=$ONENATION_UPLOAD_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ONENATION_UPLOAD_KEY_ALIAS=$ONENATION_UPLOAD_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ONENATION_UPLOAD_KEY_PASSWORD=$ONENATION_UPLOAD_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        run: gradle assembleRelease

      - name: Rename APK for release
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in app/build/outputs/apk/release"
            exit 1
          fi
          APK_NAME="OneNation-${GITHUB_REF_NAME}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: OneNation ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.APK_NAME }}
